<style>
@import url('https://fonts.googleapis.com/css2?family=ABC+Diatype:wght@400&family=Unbounded:wght@300;400;700&family=DM+Mono:wght@300;400&display=swap');
@import url('https://fonts.googleapis.com/css2?family=Unbounded:wght@200;300;400;700;900&family=DM+Mono:ital,wght@0,300;0,400;1,300&display=swap');

* { margin:0; padding:0; box-sizing:border-box; }

:root {
  --bg: #080808;
  --surface: #111;
  --border: #1e1e1e;
  --border2: #2a2a2a;
  --text: #f0f0f0;
  --muted: #444;
  --muted2: #2c2c2c;
  --white: #f0f0f0;
}

html, body {
  height: 100%;
  overflow: hidden;
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Mono', monospace;
  cursor: default;
}

/* ── LAYOUT ─────────────────────────────────── */
.app {
  display: grid;
  grid-template-rows: 52px 1fr;
  grid-template-columns: 200px 1fr 240px;
  height: 100vh;
}

/* ── HEADER ─────────────────────────────────── */
header {
  grid-column: 1 / -1;
  display: flex;
  align-items: center;
  padding: 0 24px;
  border-bottom: 1px solid var(--border);
  gap: 20px;
}
.logo {
  font-family: 'Unbounded', sans-serif;
  font-weight: 700;
  font-size: 14px;
  letter-spacing: 6px;
  color: var(--white);
}
.logo-dot {
  display: inline-block;
  width: 6px; height: 6px;
  background: var(--white);
  border-radius: 50%;
  margin-left: 4px;
  vertical-align: middle;
  animation: breathe 3s ease-in-out infinite;
}
@keyframes breathe { 0%,100%{opacity:1} 50%{opacity:0.2} }

.header-sep { flex:1; }

.header-chips {
  display: flex;
  gap: 6px;
}
.chip {
  font-size: 9px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--muted);
  padding: 4px 10px;
  border: 1px solid var(--border2);
  border-radius: 2px;
}

/* ── LEFT: HISTORY ──────────────────────────── */
.sidebar-left {
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.sidebar-section {
  padding: 16px;
  border-bottom: 1px solid var(--border);
}
.sidebar-label {
  font-size: 8px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 12px;
}
.new-btn {
  width: 100%;
  padding: 8px;
  background: var(--white);
  color: var(--bg);
  border: none;
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  letter-spacing: 2px;
  text-transform: uppercase;
  cursor: pointer;
  transition: opacity 0.15s;
}
.new-btn:hover { opacity: 0.8; }

.history-scroll {
  flex: 1;
  overflow-y: auto;
  padding: 8px 0;
}
.history-scroll::-webkit-scrollbar { width: 0; }

.hist-item {
  padding: 10px 16px;
  cursor: pointer;
  transition: background 0.1s;
  border-left: 2px solid transparent;
}
.hist-item:hover { background: var(--surface); }
.hist-item.active {
  border-left-color: var(--white);
  background: var(--surface);
}
.hist-title {
  font-size: 10px;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-bottom: 3px;
  line-height: 1.4;
}
.hist-date {
  font-size: 8px;
  color: var(--muted);
  letter-spacing: 1px;
}

.memory-section {
  padding: 14px 16px;
  border-top: 1px solid var(--border);
}
.memory-items {
  display: flex;
  flex-direction: column;
  gap: 4px;
  margin-top: 8px;
  max-height: 80px;
  overflow-y: auto;
}
.memory-items::-webkit-scrollbar { width: 0; }
.mem-item {
  font-size: 9px;
  color: var(--muted);
  line-height: 1.5;
  letter-spacing: 0.2px;
  padding-left: 8px;
  border-left: 1px solid var(--border2);
}
.mem-empty {
  font-size: 9px;
  color: var(--muted);
  font-style: italic;
}

/* ── CENTER: CHAT ────────────────────────────── */
.chat-area {
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
}

.messages {
  flex: 1;
  overflow-y: auto;
  padding: 32px 40px;
  display: flex;
  flex-direction: column;
  gap: 24px;
  scroll-behavior: smooth;
}
.messages::-webkit-scrollbar { width: 0; }

/* ── WELCOME ─────────────────────────────────── */
.welcome {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 40px;
  padding: 40px;
  text-align: center;
}

/* THE SMILE — central figure */
.smile-wrap {
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
}
.smile-svg {
  width: 110px;
  height: 110px;
  animation: slow-rotate 20s linear infinite;
}
@keyframes slow-rotate { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
.smile-ring-text {
  position: absolute;
  width: 110px; height: 110px;
}

.welcome-title {
  font-family: 'Unbounded', sans-serif;
  font-weight: 300;
  font-size: 11px;
  letter-spacing: 8px;
  text-transform: uppercase;
  color: var(--muted);
}

.sugs {
  display: flex;
  flex-direction: column;
  gap: 6px;
  width: 100%;
  max-width: 380px;
}
.sug {
  padding: 11px 16px;
  background: transparent;
  border: 1px solid var(--border2);
  color: var(--muted);
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.5px;
  text-align: left;
  cursor: pointer;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  gap: 12px;
}
.sug:hover {
  background: var(--surface);
  color: var(--white);
  border-color: var(--border2);
}
.sug-icon { opacity: 0.5; font-size: 13px; }

/* ── MESSAGES ────────────────────────────────── */
.msg {
  display: flex;
  flex-direction: column;
  gap: 6px;
  opacity: 0;
  animation: fadein 0.2s ease forwards;
  max-width: 72%;
}
@keyframes fadein { to { opacity:1; } }

.msg.user { align-self: flex-end; align-items: flex-end; }
.msg.agent { align-self: flex-start; align-items: flex-start; }

.msg-who {
  font-size: 8px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--muted);
}

.msg-bubble {
  padding: 14px 18px;
  font-size: 12px;
  line-height: 1.75;
  letter-spacing: 0.1px;
}
.msg.agent .msg-bubble {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text);
}
.msg.user .msg-bubble {
  background: var(--white);
  color: var(--bg);
}
.msg-bubble p { margin-bottom: 8px; }
.msg-bubble p:last-child { margin: 0; }
.msg-bubble ul { padding-left: 16px; margin: 6px 0; }
.msg-bubble li { margin-bottom: 3px; }
.msg-bubble strong { font-weight: 700; }

/* Typing */
.typing-row {
  display: flex; gap: 5px; padding: 14px 18px; align-items: center;
}
.typing-row span {
  width: 5px; height: 5px;
  background: var(--muted);
  border-radius: 50%;
  animation: pulse2 1.2s ease-in-out infinite;
}
.typing-row span:nth-child(2) { animation-delay: 0.2s; }
.typing-row span:nth-child(3) { animation-delay: 0.4s; }
@keyframes pulse2 { 0%,100%{opacity:0.2} 50%{opacity:1} }

/* ── INPUT ───────────────────────────────────── */
.input-row {
  border-top: 1px solid var(--border);
  display: flex;
  align-items: stretch;
  background: var(--bg);
}
.input-inner {
  flex: 1;
  padding: 16px 20px;
  display: flex;
  align-items: flex-end;
  gap: 12px;
}
textarea {
  flex: 1;
  background: none;
  border: none;
  outline: none;
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  color: var(--text);
  resize: none;
  line-height: 1.6;
  max-height: 90px;
}
textarea::placeholder { color: var(--muted); }
.send-btn {
  padding: 8px 20px;
  background: var(--white);
  color: var(--bg);
  border: none;
  font-family: 'Unbounded', sans-serif;
  font-weight: 700;
  font-size: 9px;
  letter-spacing: 3px;
  text-transform: uppercase;
  cursor: pointer;
  transition: opacity 0.15s;
  white-space: nowrap;
  align-self: flex-end;
}
.send-btn:hover:not(:disabled) { opacity: 0.8; }
.send-btn:disabled { opacity: 0.2; cursor: not-allowed; }

.img-btn {
  display: flex; align-items: center; justify-content: center;
  width: 32px; height: 32px; flex-shrink: 0;
  color: var(--muted); cursor: pointer;
  border: 1px solid var(--border2); border-radius: 4px;
  transition: all 0.15s;
  align-self: flex-end; margin-bottom: 2px;
}
.img-btn:hover { color: var(--white); border-color: var(--white); }

/* ── RIGHT: STEPS ───────────────────────────── */
.sidebar-right {
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.steps-scroll {
  flex: 1;
  overflow-y: auto;
  padding: 12px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.steps-scroll::-webkit-scrollbar { width: 0; }

.step {
  padding: 10px 12px;
  opacity: 0;
  transform: translateY(6px);
  transition: all 0.25s ease;
  font-size: 10px;
  line-height: 1.5;
  letter-spacing: 0.2px;
}
.step.show { opacity: 1; transform: translateY(0); }
.step.thinking { color: var(--muted); border-left: 1px solid var(--border2); }
.step.tool { background: var(--surface); color: var(--text); border-left: 1px solid var(--white); }
.step.result { color: var(--muted); border-left: 1px solid var(--border2); }
.step.error { color: #666; border-left: 1px solid #333; }
.step-label {
  font-size: 7px;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  margin-bottom: 4px;
  color: var(--muted);
}
.step.tool .step-label { color: var(--white); }

.steps-idle {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 16px;
  padding: 20px;
}

/* small smile in idle state */
.smile-idle {
  opacity: 0.12;
}

.steps-idle-text {
  font-size: 8px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--muted);
  text-align: center;
}

/* ── ONBOARDING ──────────────────────────────── */
.onboarding-overlay {
  position: fixed;
  inset: 0;
  background: var(--bg);
  z-index: 1000;
  display: flex;
  align-items: center;
  justify-content: center;
  animation: fadein 0.4s ease;
}
.onboarding-box {
  width: 440px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 36px;
  padding: 48px 40px;
}
.ob-smile {
  animation: slow-rotate 20s linear infinite;
}
.ob-step {
  width: 100%;
  display: flex;
  flex-direction: column;
  gap: 10px;
  animation: fadein 0.3s ease;
}
.ob-progress {
  display: flex;
  gap: 5px;
  justify-content: center;
  margin-bottom: 4px;
}
.ob-dot {
  width: 20px; height: 2px;
  background: var(--border2);
  transition: background 0.3s;
}
.ob-dot.active { background: var(--white); }
.ob-question {
  font-family: 'Unbounded', sans-serif;
  font-weight: 300;
  font-size: 13px;
  letter-spacing: 1px;
  color: var(--white);
  line-height: 1.6;
  text-align: center;
}
.ob-hint {
  font-size: 9px;
  letter-spacing: 1.5px;
  color: var(--muted);
  text-align: center;
  text-transform: uppercase;
}
.ob-input {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border2);
  padding: 14px 16px;
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  color: var(--white);
  outline: none;
  transition: border-color 0.2s;
  border-radius: 0;
}
.ob-input:focus { border-color: var(--white); }
.ob-input::placeholder { color: var(--muted); }
.ob-next {
  width: 100%;
  padding: 13px;
  background: var(--white);
  color: var(--bg);
  border: none;
  font-family: 'Unbounded', sans-serif;
  font-weight: 700;
  font-size: 9px;
  letter-spacing: 3px;
  text-transform: uppercase;
  cursor: pointer;
  transition: opacity 0.15s;
}
.ob-next:hover { opacity: 0.8; }
.ob-skip {
  font-size: 8px;
  letter-spacing: 2px;
  color: var(--muted);
  text-transform: uppercase;
  background: none;
  border: none;
  cursor: pointer;
  font-family: 'DM Mono', monospace;
  transition: color 0.15s;
}
.ob-skip:hover { color: var(--white); }
</style>
</head>
<body>
<div class="app">

  <!-- HEADER -->
  <header>
    <div class="logo">EL PIBE<span class="logo-dot"></span></div>
    <div class="header-sep"></div>
    <div class="header-chips">
      <div class="chip">Gmail</div>
      <div class="chip">Calendar</div>
      <div class="chip">Web</div>
      <div class="chip">Memoria</div>
    </div>
  </header>

  <!-- LEFT -->
  <div class="sidebar-left">
    <div class="sidebar-section">
      <div class="sidebar-label">Sesiones</div>
      <button class="new-btn" onclick="newChat()">+ nueva sesión</button>
    </div>
    <div class="history-scroll" id="historyList"></div>
    <div class="memory-section">
      <div class="sidebar-label">Memoria</div>
      <div class="memory-items" id="memoryList">
        <div class="mem-empty">sin datos aún</div>
      </div>
    </div>
  </div>

  <!-- CENTER -->
  <div class="chat-area">
    <div class="messages" id="messages">
      <div class="welcome" id="welcome">

        <!-- THE SMILE -->
        <div class="smile-wrap">
          <svg class="smile-svg" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
            <!-- outer ring -->
            <circle cx="50" cy="50" r="46" stroke="#1e1e1e" stroke-width="1"/>
            <!-- face circle -->
            <circle cx="50" cy="50" r="34" stroke="#f0f0f0" stroke-width="1.5"/>
            <!-- eyes -->
            <circle cx="41" cy="44" r="2.5" fill="#f0f0f0"/>
            <circle cx="59" cy="44" r="2.5" fill="#f0f0f0"/>
            <!-- smile arc -->
            <path d="M 38 56 Q 50 67 62 56" stroke="#f0f0f0" stroke-width="1.8" stroke-linecap="round" fill="none"/>
            <!-- orbit dots -->
            <circle cx="50" cy="4" r="2" fill="#2a2a2a"/>
            <circle cx="96" cy="50" r="2" fill="#2a2a2a"/>
            <circle cx="50" cy="96" r="2" fill="#2a2a2a"/>
            <circle cx="4" cy="50" r="2" fill="#2a2a2a"/>
          </svg>
        </div>

        <div class="welcome-title">el pibe</div>

        <div class="sugs">
          <button class="sug" onclick="useSuggestion(this)"><span class="sug-icon">📅</span><span>¿Qué tengo esta semana?</span></button>
          <button class="sug" onclick="useSuggestion(this)"><span class="sug-icon">📧</span><span>Resumíme mis últimos emails</span></button>
          <button class="sug" onclick="useSuggestion(this)"><span class="sug-icon">▶️</span><span>¿Cómo está yendo el canal de YouTube?</span></button>
          <button class="sug" onclick="useSuggestion(this)"><span class="sug-icon">🎯</span><span>Armame una estrategia de contenido para el canal</span></button>
        </div>
      </div>
    </div>

    <div class="input-row">
      <div class="input-inner">
        <label for="imageInput" class="img-btn" title="Adjuntar imagen">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>
            <path d="M21 15l-5-5L5 21"/>
          </svg>
        </label>
        <input type="file" id="imageInput" accept="image/*" style="display:none" onchange="handleImageSelect(event)">
        <div id="imagePreview" style="display:none;align-items:center;gap:6px;padding:4px 0;">
          <img id="previewImg" style="height:36px;width:36px;object-fit:cover;border:1px solid var(--border2);">
          <button onclick="clearImage()" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px;">×</button>
        </div>
        <textarea id="userInput" placeholder="escribí tu tarea..." rows="1"
          onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">enviar</button>
      </div>
    </div>
  </div>

  <!-- RIGHT: STEPS -->
  <div class="sidebar-right">
    <div class="sidebar-section">
      <div class="sidebar-label">Proceso</div>
    </div>
    <div class="steps-scroll" id="stepsList">
      <div class="steps-idle" id="stepsIdle">
        <!-- small smile idle -->
        <svg class="smile-idle" width="48" height="48" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="50" cy="50" r="34" stroke="#f0f0f0" stroke-width="1.5"/>
          <circle cx="41" cy="44" r="2.5" fill="#f0f0f0"/>
          <circle cx="59" cy="44" r="2.5" fill="#f0f0f0"/>
          <path d="M 38 56 Q 50 67 62 56" stroke="#f0f0f0" stroke-width="1.8" stroke-linecap="round" fill="none"/>
        </svg>
        <div class="steps-idle-text">en espera</div>
      </div>
    </div>
  </div>

</div>

<!-- ONBOARDING OVERLAY -->
<div class="onboarding-overlay" id="onboardingOverlay" style="display:none">
  <div class="onboarding-box">
    <svg class="ob-smile" width="80" height="80" viewBox="0 0 100 100" fill="none">
      <circle cx="50" cy="50" r="46" stroke="#1e1e1e" stroke-width="1"/>
      <circle cx="50" cy="50" r="34" stroke="#f0f0f0" stroke-width="1.5"/>
      <circle cx="41" cy="44" r="2.5" fill="#f0f0f0"/>
      <circle cx="59" cy="44" r="2.5" fill="#f0f0f0"/>
      <path d="M 38 56 Q 50 67 62 56" stroke="#f0f0f0" stroke-width="1.8" stroke-linecap="round" fill="none"/>
      <circle cx="50" cy="4" r="2" fill="#2a2a2a"/>
      <circle cx="96" cy="50" r="2" fill="#2a2a2a"/>
      <circle cx="50" cy="96" r="2" fill="#2a2a2a"/>
      <circle cx="4" cy="50" r="2" fill="#2a2a2a"/>
    </svg>
    <div class="ob-step" id="obStep"></div>
  </div>
</div>

<script>
// ── Storage ───────────────────────────────────
function loadSessions() { try { return JSON.parse(localStorage.getItem('agnt3_sessions')||'[]'); } catch { return []; } }
function saveSessions(s) { localStorage.setItem('agnt3_sessions', JSON.stringify(s)); }
function loadMemory() { try { return JSON.parse(localStorage.getItem('agnt3_memory')||'[]'); } catch { return []; } }
function saveMemory(m) { localStorage.setItem('agnt3_memory', JSON.stringify(m)); }

// ── State ─────────────────────────────────────
let sessions = loadSessions();
let memory = loadMemory();
let currentId = null;
let history = [];
let isLoading = false;

// ── Init (called after all functions defined) ──

// ── Sessions ──────────────────────────────────
function newChat() {
  const id = Date.now().toString();
  sessions.unshift({ id, title: 'nueva sesión', date: new Date().toLocaleDateString('es-UY'), messages: [] });
  saveSessions(sessions);
  currentId = id;
  history = [];
  renderHistory();
  resetUI();
}

function loadSession(id) {
  const s = sessions.find(x => x.id === id);
  if (!s) return;
  currentId = id;
  history = s.messages || [];
  renderHistory();
  replayMessages();
}

function saveSession() {
  const idx = sessions.findIndex(x => x.id === currentId);
  if (idx === -1) return;
  sessions[idx].messages = history;
  const first = history.find(m => m.role === 'user');
  if (first) {

}

function fmt(t) {
  return t
    .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.*?)\*/g,'<em>$1</em>')
    .replace(/`(.*?)`/g,'<code style="background:#1a1a1a;padding:1px 5px;font-size:11px;border-radius:2px;">$1</code>')
    .replace(/^[-•] (.*)/gm,'<li>$1</li>')
    .replace(/(<li>.*<\/li>\n?)+/gs, m=>`<ul style="padding-left:14px;margin:6px 0;">${m}</ul>`)
    .split('\n\n').map(p=>p.startsWith('<ul')?p:`<p>${p}</p>`).join('');
}

async function extractMemory(userMsg, reply) {

    const r = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        model:'claude-sonnet-4-20250514', max_tokens:200,
        messages:[{ role:'user', content:`Del siguiente intercambio, extraé 0-2 datos sobre el usuario para recordar (nombre, deporte, preferencias, metas, horarios). Respondé SOLO con array JSON de strings cortos en español, sin markdown. Si no hay nada, respondé [].\nUsuario: ${userMsg}\nAgente: ${reply.slice(0,300)}` }]
      })
    });
    const d = await r.json();
    const raw = d.content?.[0]?.text||'[]';
    const items = JSON.parse(raw.replace(/```json|```/g,'').trim());
    if (Array.isArray(items) && items.length) {
      memory = [...memory, ...items].slice(-20);
      saveMemory(memory);
      renderMemory();
    }
  } catch{}
}

const OB_QUESTIONS = [
  { key: 'nombre',     q: '¿Cómo te llamás?',                        hint: 'tu nombre',           placeholder: 'ej: Matías' },
  { key: 'deporte',    q: '¿Qué deporte o actividad física hacés?',   hint: 'actividad principal',  placeholder: 'ej: running, ciclismo, natación...' },
  { key: 'frecuencia', q: '¿Cuántos días por semana entrenás?',       hint: 'frecuencia',           placeholder: 'ej: 4 días, lunes miércoles viernes...' },
  { key: 'meta',       q: '¿Tenés alguna meta o carrera próxima?',    hint: 'objetivo',             placeholder: 'ej: maratón en octubre, bajar 10min en 5k...' },
  { key: 'extra',      q: '¿Algo más que quieras que recuerde?',      hint: 'opcional',             placeholder: 'ej: trabajo de 9 a 18, prefiero entrenar a la mañana...' },
];
let obIndex = 0;
let obAnswers = {};

function startOnboarding() {
  document.getElementById('onboardingOverlay').style.display = 'flex';
  renderObStep();
}

function renderObStep() {
  const q = OB_QUESTIONS[obIndex];
  const isLast = obIndex === OB_QUESTIONS.length - 1;
  const dots = OB_QUESTIONS.map((_, i) =>
    `<div class="ob-dot${i <= obIndex ? ' active' : ''}"></div>`).join('');

  document.getElementById('obStep').innerHTML = `
    <div class="ob-progress">${dots}</div>
    <div class="ob-question">${q.q}</div>
    <div class="ob-hint">${q.hint}</div>
    <input class="ob-input" id="obInput" type="text" placeholder="${q.placeholder}" autocomplete="off"/>
    <button class="ob-next" onclick="obNext()">${isLast ? 'listo →' : 'siguiente →'}</button>
    ${obIndex > 0 ? '' : '<button class="ob-skip" onclick="skipOnboarding()">saltar</button>'}
  `;
  setTimeout(() => {
    const inp = document.getElementById('obInput');
    if (inp) {
      inp.focus();
      inp.onkeydown = e => { if(e.key==='Enter') obNext(); };
    }
  }, 50);
}

function obNext() {
  const inp = document.getElementById('obInput');
  const val = inp ? inp.value.trim() : '';
  const q = OB_QUESTIONS[obIndex];
  if (val) obAnswers[q.key] = val;

  if (obIndex < OB_QUESTIONS.length - 1) {
    obIndex++;
    renderObStep();
  } else {
    finishOnboarding();
  }
}

function finishOnboarding() {
  // Build memory items from answers
  const items = [];
  if (obAnswers.nombre)     items.push(`Nombre: ${obAnswers.nombre}`);
  if (obAnswers.deporte)    items.push(`Deporte: ${obAnswers.deporte}`);
  if (obAnswers.frecuencia) items.push(`Entrena: ${obAnswers.frecuencia}`);
  if (obAnswers.meta)       items.push(`Meta: ${obAnswers.meta}`);
  if (obAnswers.extra)      items.push(`Nota: ${obAnswers.extra}`);

  if (items.length) {
    memory = [...memory, ...items].slice(-20);
    saveMemory(memory);
    renderMemory();
  }

  localStorage.setItem('agnt3_onboarded', '1');
  document.getElementById('onboardingOverlay').style.display = 'none';

  if (sessions.length > 0) loadSession(sessions[0].id);
  else newChat();

  // Send a welcome message from agent
  setTimeout(() => {
    const name = obAnswers.nombre ? `, ${obAnswers.nombre}` : '';
    appendMsg('agent', `Dale${name}, todo cargado 👊\n\nYa sé quién sos. Podés pedirme revisar tu calendario, tus emails, armar un plan de entrenamientos o buscar lo que necesites.\n\n¿Por dónde arrancamos?`);
  }, 300);
}

function skipOnboarding() {
  localStorage.setItem('agnt3_onboarded', '1');
  document.getElementById('onboardingOverlay').style.display = 'none';
  if (sessions.length > 0) loadSession(sessions[0].id);
  else newChat();
}

async function sendMessage() {
  if (isLoading) return;
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text) return;

  hideWelcome();
  input.value = ''; input.style.height = 'auto';
  isLoading = true;
  document.getElementById('sendBtn').disabled = true;
  resetSteps();

  appendMsg('user', text, true, pendingImage);

  // Build user content with optional image
  let userContent;
  if (pendingImage) {
    userContent = [
      { type: 'image', source: { type: 'base64', media_type: pendingImage.mediaType, data: pendingImage.base64 } },
      { type: 'text', text }
    ];
    clearImage();
  } else {
    userContent = text;
  }
  history.push({ role:'user', content: userContent });
  addTyping();
  addStep('thinking', 'analizando solicitud...');

  const sys = SYS.replace('{{MEM}}', memory.length ? memory.map(m=>`- ${m}`).join('\n') : 'sin datos previos');

  // Fetch Google data if needed
  const googleData = await handleGoogleData(text);
  let messagesForApi = [...history];
  if (googleData) {
    messagesForApi = [...history.slice(0,-1), { role:'user', content:`${text}\n\n[Datos en tiempo real]\n${googleData}` }];
    addStep('result', 'datos obtenidos ✓');
  }

  try {
    const res = await fetch('/api/google?action=chat', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ model:'claude-sonnet-4-20250514', max_tokens:1500, system: sys, messages: messagesForApi })
    });

    const data = await res.json();
    removeTyping();

    if (!res.ok) {
      addStep('error', data.error?.message || 'error desconocido');
      appendMsg('agent', 'Hubo un error. Intentá de nuevo.');
      isLoading = false;
      document.getElementById('sendBtn').disabled = false;
      return;
    }

    let fullText = '';
    for (const b of (data.content||[])) { if (b.type==='text') fullText += b.text; }

    // Check for calendar event creation
    const eventMatch = fullText.match(/\[CREAR_EVENTO:(.*?)\]/s);
    if (eventMatch) {
      try {
        const eventData = JSON.parse(eventMatch[1]);
        addStep('tool', 'creando evento en Calendar...');
        const created = await createCalendarEvent(eventData);
        if (created && created.id) {
          addStep('result', 'evento creado ✓');
          fullText = fullText.replace(/\[CREAR_EVENTO:.*?\]/s, '') + '\n\n✅ Evento creado en tu calendario.';
        }
      } catch(e) {}
    }

    if (fullText) {
      addStep('result', 'respuesta generada');
      appendMsg('agent', fullText.trim());
      history.push({ role:'assistant', content: data.content });
      saveSession(); renderHistory();
      extractMemory(text, fullText);
    } else {
      appendMsg('agent', 'Listo. ¿Algo más?');
    }

  } catch(err) {
    removeTyping();
    addStep('error', err.message);
    appendMsg('agent', 'Error de conexión.');
  }

  isLoading = false;
  document.getElementById('sendBtn').disabled = false;
}

// ── Google Auth (multi-cuenta) ────────────────
function loadAuth(type) { try { return JSON.parse(localStorage.getItem(`agnt3_auth_${type}`)||'null'); } catch { return null; } }
function saveAuth(type, a) { a ? localStorage.setItem(`agnt3_auth_${type}`, JSON.stringify(a)) : localStorage.removeItem(`agnt3_auth_${type}`); }
let authPersonal = loadAuth('personal');
let authAdvisory = loadAuth('advisory');
let authYoutube  = loadAuth('youtube');

function getAuthByType(type) {
  if (type === 'advisory') return authAdvisory;
  if (type === 'youtube')  return authYoutube;
  return authPersonal;
}
function setAuthByType(type, a) {
  if (type === 'advisory') authAdvisory = a;
  else if (type === 'youtube') authYoutube = a;
  else authPersonal = a;
  saveAuth(type, a);
}

function handleOAuthCallback() {
  const params = new URLSearchParams(window.location.search);
  const access_token = params.get('access_token');
  const error = params.get('error');
  if (error) { window.history.replaceState({}, '', '/'); return; }
  if (access_token) {
    const account_type = params.get('account_type') || 'personal';
    const authData = {
      access_token,
      refresh_token: params.get('refresh_token') || '',
      email: params.get('email') || '',
      name: params.get('name') || '',
      expires_at: Date.now() + (parseInt(params.get('expires_in')) || 3600) * 1000
    };
    setAuthByType(account_type, authData);
    window.history.replaceState({}, '', '/');
    updateAuthUI();
    const labels = { personal: 'cuenta personal', advisory: 'cuenta advisory', youtube: 'YouTube' };
    setTimeout(() => appendMsg('agent', `¡Dale! Conecté tu ${labels[account_type] || 'cuenta'} (${authData.email}). ¿Arrancamos?`), 400);
  }
}

function updateAuthUI() {
  const chips = document.querySelector('.header-chips');
  if (!chips) return;
  const c = (label, connected, type, hint, color) =>
    `<div class="chip" style="cursor:pointer;color:${connected ? color : '#555'}" onclick="connectAccount('${type}','${hint}')" title="${connected ? getAuthByType(type)?.email : 'Conectar'}">${connected ? label + ' ✓' : '+ ' + label}</div>`;
  chips.innerHTML =
    c('Personal', !!authPersonal, 'personal', 'zluigi9@gmail.com', '#aaffaa') +
    c('Advisory', !!authAdvisory, 'advisory', 'advisory.luigi@gmail.com', '#aaffaa') +
    c('YouTube',  !!authYoutube,  'youtube',  'elpibitodelasnaves@gmail.com', '#ffaaaa') +
    `<div class="chip">Memoria</div>`;
}

function connectAccount(type, hint) {
  window.location.href = `/api/google?action=login&account_type=${type}&hint=${encodeURIComponent(hint)}`;
}

async function ensureValidToken(type = 'personal') {
  const auth = getAuthByType(type);
  if (!auth) return null;
  if (Date.now() < auth.expires_at - 60000) return auth.access_token;
  if (!auth.refresh_token) { setAuthByType(type, null); updateAuthUI(); return null; }
  try {
    const res = await fetch('/api/google?action=refresh', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ refresh_token: auth.refresh_token }) });
    const data = await res.json();
    if (data.access_token) {
      const updated = {...auth, access_token: data.access_token, expires_at: Date.now() + (data.expires_in||3600)*1000};
      setAuthByType(type, updated);
      return data.access_token;
    }
  } catch(e) {}
  return null;
}

async function fetchEmails() {
  const allEmails = [];
  for (const type of ['personal', 'advisory']) {
    const token = await ensureValidToken(type);
    if (!token) continue;
    try {
      const res = await fetch('/api/google?action=gmail', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ access_token: token, gmail_action: 'list' }) });
      const d = await res.json();
      if (d.emails) allEmails.push(...d.emails.map(e => ({...e, account: getAuthByType(type)?.email || type})));
    } catch(e) {}
  }
  return { emails: allEmails };
}

async function fetchCalendar() {
  const allEvents = [];
  for (const type of ['personal', 'advisory']) {
    const token = await ensureValidToken(type);
    if (!token) continue;
    try {
      const res = await fetch('/api/google?action=calendar', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ access_token: token, cal_action: 'list' }) });
      const d = await res.json();
      if (d.events) allEvents.push(...d.events.map(e => ({...e, account: getAuthByType(type)?.email || type})));
    } catch(e) {}
  }
  return { events: allEvents.sort((a,b) => a.start.localeCompare(b.start)) };
}

async function createCalendarEvent(event) {
  const token = await ensureValidToken('personal');
  if (!token) return null;
  const res = await fetch('/api/google?action=calendar', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ access_token: token, cal_action: 'create', event }) });
  return await res.json();
}

async function handleGoogleData(text) {
  const lower = text.toLowerCase();
  const hasGoogle = authPersonal || authAdvisory;
  if (hasGoogle && (lower.includes('calendario')||lower.includes('agenda')||lower.includes('semana')||lower.includes('qué tengo')||lower.includes('eventos'))) {
    addStep('tool', 'leyendo Google Calendar...');
    const d = await fetchCalendar();
    if (d && d.events) return `DATOS_CALENDARIO:\n${JSON.stringify(d.events)}`;
  }
  if (hasGoogle && (lower.includes('mail')||lower.includes('email')||lower.includes('correo')||lower.includes('mensajes')||lower.includes('bandeja'))) {
    addStep('tool', 'leyendo Gmail...');
    const d = await fetchEmails();
    if (d && d.emails) return `DATOS_EMAILS:\n${JSON.stringify(d.emails)}`;
  }
  if (authYoutube && (lower.includes('youtube')||lower.includes('canal')||lower.includes('video')||lower.includes('pibito')||lower.includes('suscriptor')||lower.includes('vistas')||lower.includes('contenido')||lower.includes('título')||lower.includes('estrategia'))) {
    addStep('tool', 'leyendo YouTube...');
    const parts = [];
    const canal = await fetchYouTubeChannel();
    if (canal && canal.title) parts.push(`DATOS_YOUTUBE_CANAL:\n${JSON.stringify(canal)}`);
    const videos = await fetchYouTubeVideos(25);
    if (videos && videos.videos) parts.push(`DATOS_YOUTUBE_VIDEOS:\n${JSON.stringify(videos.videos)}`);
    if (lower.includes('analytics')||lower.includes('crecimiento')||lower.includes('rendimiento')||lower.includes('estadística')) {
      const analytics = await fetchYouTubeAnalytics();
      if (analytics && analytics.rows) parts.push(`DATOS_YOUTUBE_ANALYTICS:\n${JSON.stringify(analytics)}`);
    }
    if (parts.length) return parts.join('\n\n');
  }
  return null;
}

// ── Bootstrap ─────────────────────────────────
handleOAuthCallback();
updateAuthUI();
renderHistory();
renderMemory();
const isFirstTime = !localStorage.getItem('agnt3_onboarded');
if (isFirstTime) {
  startOnboarding();
} else {
  if (sessions.length > 0) loadSession(sessions[0].id);
  else newChat();
}
</script>
